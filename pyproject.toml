[tool.black]
line-length = 79
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 79
known_first_party = ["app", "core", "ui"]
skip = [".venv", "vendor", "workspace"]

[tool.ruff]
line-length = 79
target-version = "py310"
extend-exclude = [".venv", "vendor", "workspace"]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = []

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-ra -p no:cacheprovider"
