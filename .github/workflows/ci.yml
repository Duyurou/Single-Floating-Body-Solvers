name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install black isort ruff pytest

      - name: Check formatting
        run: python -m black --check app core ui tests

      - name: Check imports
        run: python -m isort --check-only app core ui tests

      - name: Run lint
        run: python -m ruff check app core ui tests

      - name: Run tests
        run: python -m pytest
